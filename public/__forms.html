<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Netlify form detection</title>
  </head>
  <body>
    <!--
      Hidden static forms ONLY for Netlify's build-time form detection. The real
      styled form is src/components/ConnectForm.tsx, which POSTs here using the
      per-profile form name "connect-<slug>". One form per profile means each
      person gets their OWN Netlify form + their OWN email notification.
      ADD A NEW <form> HERE (matching the slug) whenever you add a teammate.
    -->
    <form name="connect-melina" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="connect-melina" />
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="tel" name="phone" />
      <input type="text" name="company" />
      <input type="text" name="profile" />
      <input type="text" name="save_contact" />
      <input type="text" name="bot-field" />
    </form>
    <form name="connect-koba" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="connect-koba" />
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="tel" name="phone" />
      <input type="text" name="company" />
      <input type="text" name="profile" />
      <input type="text" name="save_contact" />
      <input type="text" name="bot-field" />
    </form>
  </body>
</html>
